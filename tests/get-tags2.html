<html>
  <head>
    <script type="text/javascript" src="//dl.frontapp.com/libs/plugin-sdk-1.0.1.min.js"></script>
  </head>
  <body>
    <script type="text/javascript">

      tags = Front.listTags();
      tags.then(function ok(lol){
        document.getElementById("tag").innerHTML = JSON.stringify(lol);
      },function notok(lol){
        document.getElementById("tag").innerHTML = JSON.stringify(lol);
      });
      
      msgs = Front.listMessages();
      msgs.then(function ok(lol){
        document.getElementById("msg").innerHTML = JSON.stringify(lol);
      },function notok(lol){
        document.getElementById("msg").innerHTML = JSON.stringify(lol);
      });
    </script>
    <h2> Messages </h2>
    <p id = "msg">
      
    </p>
    
    <h2> Tags </h2>
    <p id="tag">
    
    </p>
  </body>
</html>
